<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Montserrat', sans-serif;
  background:#efefef; color:#111;
}
body { display:flex; }

/* ── LEFT NAV ─────────────────────────── */
#site-nav {
  width:186px; flex-shrink:0;
  background:#fff; border-right:1px solid #e8e8e8;
  display:flex; flex-direction:column;
  z-index:10; overflow:hidden;
}
.nav-logo {
  padding:16px 15px 13px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer; flex-shrink:0;
}
.nav-logo:hover .nav-logo-text { opacity:.7; }
.nav-logo-text {
  font-size:15px; font-weight:200;
  letter-spacing:.42em; text-indent:.42em;
  transition:opacity .2s;
}
.nav-logo-sub {
  font-size:7.5px; font-weight:300;
  letter-spacing:.2em; color:#c0c0c0;
  margin-top:3px; text-transform:uppercase;
}

#cat-list { flex:1; overflow-y:auto; padding:6px 0; }
#cat-list::-webkit-scrollbar { width:2px; }
#cat-list::-webkit-scrollbar-thumb { background:rgba(0,0,0,.07); }

.nav-cat-head {
  display:flex; align-items:center;
  padding:6px 13px; cursor:pointer;
  font-size:11px; font-weight:400; letter-spacing:.04em;
  color:#444; transition:background .14s; user-select:none;
}
.nav-cat-head:hover { background:#f6f6f6; }
.nav-cat-head.active { color:#111; background:#f3f3f3; }
.nav-cat-emoji { font-size:12px; margin-right:7px; flex-shrink:0; }
.nav-cat-name { flex:1; }
.nav-cat-count {
  font-size:8.5px; font-weight:300;
  color:#ccc; margin-right:3px;
}
.nav-arrow {
  font-size:9px; color:#ccc; transition:transform .18s; line-height:1;
}
.nav-cat-head.open .nav-arrow { transform:rotate(90deg); }

.nav-sub { display:none; }
.nav-sub.open { display:block; background:#fafafa; border-bottom:1px solid #f0f0f0; }
.nav-sub-item {
  padding:4px 12px 4px 32px;
  font-size:9.5px; font-weight:300;
  color:#777; letter-spacing:.02em;
  cursor:pointer; transition:color .13s, background .13s;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.nav-sub-item:hover { color:#111; background:#ededed; }

.nav-music {
  border-top:1px solid #f0f0f0; padding:11px 13px;
  display:flex; align-items:center; gap:7px; flex-shrink:0;
  cursor:pointer;
}
.music-btn {
  background:none; border:none; cursor:pointer;
  font-size:14px; opacity:.35; transition:opacity .2s;
  font-family:inherit; padding:0; line-height:1;
}
.music-btn.on { opacity:.85; }
.music-meta { flex:1; min-width:0; }
.music-label {
  font-size:8px; font-weight:300; letter-spacing:.14em;
  color:#bbb; text-transform:uppercase; display:block;
}
.music-track {
  font-size:8px; font-weight:300; letter-spacing:.04em;
  color:#ccc; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; display:block; margin-top:2px;
}

/* ── MAIN AREA ────────────────────────── */
#main-area { flex:1; position:relative; overflow:hidden; }

.page {
  position:absolute; inset:0; overflow-y:auto; overflow-x:hidden;
  background:#efefef;
  transition:opacity .32s ease, transform .32s ease;
}
.page.out { opacity:0; pointer-events:none; transform:translateX(12px); }
.page::-webkit-scrollbar { width:3px; }
.page::-webkit-scrollbar-thumb { background:rgba(0,0,0,.1); border-radius:2px; }

/* ── PAGE HEADERS ─────────────────────── */
.pg-header {
  background:#fff; border-bottom:1px solid #e8e8e8;
  padding:0 18px; height:50px;
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:5;
}
.pg-title {
  font-size:12px; font-weight:300;
  letter-spacing:.2em; text-indent:.2em; color:#888;
}
.pg-back {
  background:none; border:1px solid #ddd; color:#777;
  font-family:'Montserrat',sans-serif; font-size:8.5px;
  font-weight:300; letter-spacing:.14em; padding:5px 11px;
  cursor:pointer; transition:all .18s;
}
.pg-back:hover { border-color:#999; color:#111; }

.home-hero {
  background:#fff; border-bottom:1px solid #e8e8e8;
  padding:18px 18px 14px;
}
.home-hero-title {
  font-size:clamp(20px,2.6vw,34px); font-weight:200;
  letter-spacing:.34em; text-indent:.34em;
}
.home-hero-sub {
  margin-top:5px; font-size:8.5px; font-weight:300;
  letter-spacing:.2em; color:#bbb; text-transform:uppercase;
}
.home-ad-strip {
  background:#fff; border-bottom:1px solid #ebebeb;
  display:flex; justify-content:center;
}
.home-ad-strip .ad-slot { width:728px; height:90px; }

/* ── GRID ─────────────────────────────── */
.content-pad { padding:14px 16px; }
.grid {
  display:grid; gap:11px;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
}

/* ── CARDS ────────────────────────────── */
.card {
  position:relative; cursor:pointer;
  overflow:hidden; border-radius:3px;
  background:#ccc;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  transition:box-shadow .24s, transform .2s;
}
.card:hover { box-shadow:0 6px 20px rgba(0,0,0,.14); transform:translateY(-3px); }
.card-home { aspect-ratio:4/3; }
.card-vid  { aspect-ratio:16/9; }
.card-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transition:transform .55s cubic-bezier(.2,.8,.2,1);
}
.card:hover .card-bg { transform:scale(1.05); }
.card-fade { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 52%); }
.card-tint { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background .2s; }
.card:hover .card-tint { background:rgba(0,0,0,.05); }
.card-play {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .18s;
}
.card:hover .card-play { opacity:1; }
.play-icon {
  width:42px; height:42px; border:1.5px solid rgba(255,255,255,.8);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px); background:rgba(0,0,0,.2);
}
.play-icon::after {
  content:''; width:0; height:0; border-style:solid;
  border-width:7px 0 7px 12px;
  border-color:transparent transparent transparent rgba(255,255,255,.9);
  margin-left:3px;
}
.card-arrow { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .18s; font-size:26px; color:rgba(255,255,255,.85); }
.card:hover .card-arrow { opacity:1; }
.card-info { position:absolute; bottom:0; left:0; right:0; padding:11px 13px 10px; }
.card-emoji { font-size:17px; margin-bottom:4px; display:block; }
.card-name { font-size:13px; font-weight:400; letter-spacing:.02em; color:#fff; }
.card-desc { margin-top:3px; font-size:7.5px; font-weight:300; letter-spacing:.14em; color:rgba(255,255,255,.5); text-transform:uppercase; }
.badge-4k {
  position:absolute; top:8px; right:8px;
  background:rgba(0,0,0,.38); backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.16);
  color:rgba(255,255,255,.72); font-size:7px; font-weight:400;
  letter-spacing:.1em; padding:2px 6px; border-radius:2px;
}

/* ── AD SIDEBAR ───────────────────────── */
#ad-sidebar {
  width:300px; flex-shrink:0;
  background:#f7f7f7; border-left:1px solid #e8e8e8;
  display:flex; flex-direction:column; overflow:hidden;
}
.ad-slot { display:block; overflow:hidden; }
.ad-slot-300x250 { width:300px; height:250px; }
.ad-slot-300x600 { width:300px; height:600px; }

/* ── RESPONSIVE ───────────────────────── */
@media (max-width:1080px) {
  #ad-sidebar { display:none; }
}
@media (max-width:700px) {
  #site-nav { width:150px; }
  .nav-cat-count, .nav-arrow { display:none; }
  .nav-sub-item { padding-left:26px; font-size:9px; }
}
@media (max-width:520px) {
  #site-nav { display:none; }
}

/* ── PLAYER ───────────────────────────── */
#pg-player {
  position:fixed !important; inset:0; z-index:100;
  background:#000; cursor:default;
}
#vid { width:100%; height:100%; object-fit:cover; display:block; }
.ov-top { position:absolute; top:0; left:0; right:0; height:140px; background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent); pointer-events:none; }
.ov-bot { position:absolute; bottom:0; left:0; right:0; height:110px; background:linear-gradient(to top,rgba(0,0,0,.45),transparent); pointer-events:none; }
.player-ui {
  position:absolute; inset:0;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:22px 28px;
  transition:opacity .4s ease;
}
.player-ui.hidden { opacity:0; pointer-events:none; }
.player-top { display:flex; justify-content:space-between; align-items:center; gap:10px; }
.player-logo { font-size:16px; font-weight:200; letter-spacing:.42em; text-indent:.42em; color:rgba(255,255,255,.85); text-shadow:0 2px 16px rgba(0,0,0,.9); flex:1; }
.player-btns { display:flex; gap:8px; align-items:center; }
.player-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.85); font-family:'Montserrat',sans-serif; font-size:8.5px; font-weight:300; letter-spacing:.18em; padding:7px 16px; cursor:pointer; backdrop-filter:blur(8px); transition:all .18s; }
.player-btn:hover { background:rgba(255,255,255,.18); color:#fff; }
.player-btn.icon { padding:7px 11px; font-size:13px; letter-spacing:0; }
.player-bottom { display:flex; justify-content:space-between; align-items:flex-end; }
.player-info {}
.player-scene { font-size:9.5px; font-weight:300; letter-spacing:.22em; color:rgba(255,255,255,.4); text-transform:uppercase; }
.player-quality-label { font-size:8px; font-weight:300; letter-spacing:.18em; color:rgba(255,255,255,.2); margin-top:3px; }
.quality-toggle {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5); font-family:'Montserrat',sans-serif;
  font-size:8px; font-weight:300; letter-spacing:.14em;
  padding:5px 10px; cursor:pointer; backdrop-filter:blur(6px);
  transition:all .18s;
}
.quality-toggle:hover { color:rgba(255,255,255,.85); border-color:rgba(255,255,255,.3); }
.quality-toggle.hd { color:rgba(255,200,100,.7); border-color:rgba(255,200,100,.3); }

/* loading spinner */
#vid-spinner {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity .3s;
}
#vid-spinner.show { opacity:1; }
.spinner-ring {
  width:36px; height:36px;
  border:1.5px solid rgba(255,255,255,.15);
  border-top-color:rgba(255,255,255,.6);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

// === CATEGORIES END ===

/* ── BUILD NAV TREE ─────────────────────────────── */
const catList = document.getElementById('cat-list');
CATEGORIES.forEach(cat => {
  const wrap = document.createElement('div');
  const head = document.createElement('div');
  head.className = 'nav-cat-head';
  head.dataset.id = cat.id;
  head.innerHTML = `<span class="nav-cat-emoji">${cat.emoji}</span><span class="nav-cat-name">${cat.name}</span><span class="nav-cat-count">${cat.videos.length}</span><span class="nav-arrow">›</span>`;

  const sub = document.createElement('div');
  sub.className = 'nav-sub';
  sub.id = 'sub-' + cat.id;
  cat.videos.forEach(v => {
    const item = document.createElement('div');
    item.className = 'nav-sub-item';
    item.textContent = v.name;
    item.addEventListener('click', e => { e.stopPropagation(); openPlayer(cat, v); });
    sub.appendChild(item);
  });

  head.addEventListener('click', () => {
    const isOpen = head.classList.contains('open');
    // collapse all
    document.querySelectorAll('.nav-cat-head.open').forEach(h => {
      h.classList.remove('open');
      document.getElementById('sub-' + h.dataset.id).classList.remove('open');
    });
    if (!isOpen) {
      head.classList.add('open');
      sub.classList.add('open');
      openCat(cat);
    } else {
      goHome();
    }
  });

  wrap.appendChild(head);
  wrap.appendChild(sub);
  catList.appendChild(wrap);
});

/* ── BUILD HOME GRID ────────────────────────────── */
const homeGrid = document.getElementById('home-grid');
CATEGORIES.forEach(cat => {
  const card = document.createElement('div');
  card.className = 'card card-home';
  card.innerHTML = `
    <div class="card-bg" style="background-image:url('${cat.videos[0].thumb}')"></div>
    <div class="card-fade"></div><div class="card-tint"></div>
    <div class="card-arrow">›</div>
    <div class="badge-4k">4K</div>
    <div class="card-info">
      <span class="card-emoji">${cat.emoji}</span>
      <div class="card-name">${cat.name}</div>
      <div class="card-desc">${cat.videos.length} scenes</div>
    </div>`;
  card.addEventListener('click', () => openCat(cat));
  homeGrid.appendChild(card);
});

/* ── OPEN CATEGORY ──────────────────────────────── */
let currentCat = null;
function openCat(cat) {
  currentCat = cat;
  document.getElementById('cat-title').textContent = cat.emoji + '  ' + cat.name;
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  cat.videos.forEach(v => {
    const card = document.createElement('div');
    card.className = 'card card-vid';
    card.innerHTML = `
      <div class="card-bg" style="background-image:url('${v.thumb}')"></div>
      <div class="card-fade"></div><div class="card-tint"></div>
      <div class="card-play"><div class="play-icon"></div></div>
      <div class="badge-4k">${v.quality}</div>
      <div class="card-info">
        <div class="card-name">${v.name}</div>
        <div class="card-desc">${v.quality} · pexels</div>
      </div>`;
    card.addEventListener('click', () => openPlayer(cat, v));
    grid.appendChild(card);
  });
  pg('pg-cat').scrollTop = 0;
  go('pg-home', 'pg-cat');
  setNavActive(cat.id);
  setMusic(cat.music, cat.name);
  history.pushState({ page: 'cat', catId: cat.id }, '', '#' + cat.id);
}

/* ── OPEN PLAYER ────────────────────────────────── */
const vid = document.getElementById('vid');
const spinner = document.getElementById('vid-spinner');
const playerUI = document.getElementById('player-ui');
const qualityToggle = document.getElementById('quality-toggle');
let currentVideo = null;
let isHD = false;
let uiTimer = null;

function getHDSrc(src) {
  return src
    .replace(/uhd_\d+_\d+_(\d+fps)/, 'hd_1920_1080_$1')
    .replace(/hd_3840_2160_(\d+fps)/, 'hd_1920_1080_$1')
    .replace(/hd_4096_\d+_(\d+fps)/, 'hd_1920_1080_$1');
}

function loadVideo(src) {
  spinner.classList.add('show');
  vid.src = src;
  vid.load();
  vid.play().catch(() => {});
}

function openPlayer(cat, v) {
  currentVideo = v;
  isHD = true;                          // default: 1080p — smooth streaming
  qualityToggle.textContent = '→ 4K';
  qualityToggle.classList.add('hd');
  loadVideo(getHDSrc(v.src));
  document.getElementById('player-scene').textContent = cat.emoji + '  ' + cat.name.toUpperCase() + '  ·  ' + v.name;
  document.getElementById('player-quality').textContent = '1080p · Pexels';
  // Pause ambient music while video plays
  bgm.pause();
  updatePlayerMusicBtn();
  if (!pg('pg-cat').classList.contains('out')) {
    go('pg-cat', 'pg-player');
  } else {
    openCat(cat);
    setTimeout(() => go('pg-cat', 'pg-player'), 400);
  }
  history.pushState({ page: 'player', catId: cat.id, videoId: v.id }, '', '#play');
}

// Spinner hide when playing
vid.addEventListener('playing', () => spinner.classList.remove('show'));
vid.addEventListener('waiting',  () => spinner.classList.add('show'));

// Fallback: if HD also errors, nothing to do
vid.addEventListener('error', () => {
  spinner.classList.remove('show');
});

// Quality toggle: default is HD, user can try 4K
qualityToggle.addEventListener('click', () => {
  if (!currentVideo) return;
  if (isHD) {
    // switch to 4K
    isHD = false;
    qualityToggle.textContent = 'HD';
    qualityToggle.classList.remove('hd');
    document.getElementById('player-quality').textContent = '4K · Pexels';
    loadVideo(currentVideo.src);
  } else {
    // back to HD
    isHD = true;
    qualityToggle.textContent = '→ 4K';
    qualityToggle.classList.add('hd');
    document.getElementById('player-quality').textContent = '1080p · Pexels';
    loadVideo(getHDSrc(currentVideo.src));
  }
});

function stopVideo() {
  vid.pause(); vid.src = '';
  spinner.classList.remove('show');
  // Resume music when leaving player
  if (musicOn && currentMusic && userInteracted) {
    bgm.play().catch(() => {});
  }
}

function goHome() {
  if (!pg('pg-player').classList.contains('out')) { stopVideo(); go('pg-player', 'pg-cat'); return; }
  if (!pg('pg-cat').classList.contains('out')) { go('pg-cat', 'pg-home'); }
  setNavActive(null);
}

function setNavActive(id) {
  document.querySelectorAll('.nav-cat-head').forEach(h => h.classList.toggle('active', h.dataset.id === id));
}

/* ── FULLSCREEN ─────────────────────────────────── */
const playerEl = document.getElementById('pg-player');

function showUI() {
  playerUI.classList.remove('hidden');
  playerEl.style.cursor = 'default';
  clearTimeout(uiTimer);
}
function scheduleHideUI() {
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => {
    if (document.fullscreenElement) {
      playerUI.classList.add('hidden');
      playerEl.style.cursor = 'none';
    }
  }, 3000);
}

function toggleFS() {
  if (!document.fullscreenElement) {
    playerEl.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

document.getElementById('fs-btn').addEventListener('click', toggleFS);
vid.addEventListener('dblclick', toggleFS);

playerEl.addEventListener('mousemove', () => {
  if (document.fullscreenElement) { showUI(); scheduleHideUI(); }
});
playerEl.addEventListener('click', e => {
  // single click shows UI briefly if hidden
  if (document.fullscreenElement && playerUI.classList.contains('hidden')) {
    showUI(); scheduleHideUI();
  }
});

document.addEventListener('fullscreenchange', () => {
  const fsBtn = document.getElementById('fs-btn');
  if (document.fullscreenElement) {
    fsBtn.textContent = '⛶';
    fsBtn.title = 'Exit fullscreen (Esc)';
    scheduleHideUI();
  } else {
    fsBtn.textContent = '⛶';
    fsBtn.title = 'Fullscreen';
    showUI();
    playerEl.style.cursor = 'default';
  }
});

/* ── MUSIC ──────────────────────────────────────── */
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('music-btn');
const musicTrack = document.getElementById('music-track');
const navMusic = document.getElementById('nav-music');
let musicOn = true;   // on by default
let currentMusic = '';
let userInteracted = false;

bgm.volume = 0.45;

function tryPlay() {
  if (musicOn && currentMusic && userInteracted) {
    bgm.play().catch(() => {});
  }
}

function setMusic(src, catName) {
  if (!src) return;
  musicTrack.textContent = catName.toLowerCase();
  if (src === currentMusic) { tryPlay(); return; }
  currentMusic = src;
  bgm.src = src;
  tryPlay();
}

function toggleMusic() {
  musicOn = !musicOn;
  musicBtn.classList.toggle('on', musicOn);
  if (musicOn) {
    tryPlay();
    musicTrack.textContent = currentCat ? currentCat.name.toLowerCase() : 'ambient';
  } else {
    bgm.pause();
    musicTrack.textContent = 'off';
  }
}

// Whole nav-music bar is clickable
navMusic.addEventListener('click', toggleMusic);

// Auto-start on first user interaction anywhere
function onFirstInteraction() {
  if (userInteracted) return;
  userInteracted = true;
  musicBtn.classList.toggle('on', musicOn);
  tryPlay();
  document.removeEventListener('click', onFirstInteraction);
  document.removeEventListener('touchstart', onFirstInteraction);
}
document.addEventListener('click', onFirstInteraction);
document.addEventListener('touchstart', onFirstInteraction);

// Init button state
musicBtn.classList.toggle('on', musicOn);

document.getElementById('nav-logo').addEventListener('click', goHome);
document.getElementById('cat-back').addEventListener('click', () => { go('pg-cat','pg-home'); setNavActive(null); });
document.getElementById('player-back').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  stopVideo(); go('pg-player','pg-cat');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.fullscreenElement) return; // browser handles ESC
    if (!pg('pg-player').classList.contains('out')) { stopVideo(); go('pg-player','pg-cat'); }
    else if (!pg('pg-cat').classList.contains('out')) { go('pg-cat','pg-home'); setNavActive(null); }
  }
});

function pg(id) { return document.getElementById(id); }
function go(from, to) {
  pg(from).classList.add('out');
  setTimeout(() => pg(to).classList.remove('out'), 50);
}

/* ── PLAYER MUSIC BUTTON ────────────────────────── */
const playerMusicBtn = document.getElementById('player-music-btn');
function updatePlayerMusicBtn() {
  if (!playerMusicBtn) return;
  playerMusicBtn.textContent = (musicOn && !bgm.paused) ? '♪ on' : '♪ off';
}
playerMusicBtn.addEventListener('click', () => {
  if (bgm.paused) {
    musicOn = true;
    bgm.play().catch(() => {});
  } else {
    bgm.pause();
    musicOn = false;
  }
  updatePlayerMusicBtn();
  musicBtn.classList.toggle('on', musicOn);
});

/* ── BROWSER BACK BUTTON ────────────────────────── */
window.addEventListener('popstate', e => {
  const state = e.state;
  if (!state || state.page === 'home') {
    // Back to home
    if (!pg('pg-player').classList.contains('out')) { stopVideo(); go('pg-player', 'pg-cat'); }
    setTimeout(() => {
      if (!pg('pg-cat').classList.contains('out')) { go('pg-cat', 'pg-home'); setNavActive(null); }
    }, 50);
  } else if (state.page === 'cat') {
    // Back from player to category
    if (!pg('pg-player').classList.contains('out')) { stopVideo(); go('pg-player', 'pg-cat'); }
  }
});
// Set initial history state
history.replaceState({ page: 'home' }, '', window.location.pathname);
</script>
